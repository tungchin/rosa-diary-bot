name: 處理 Bot 訊息

on:
  schedule:
    # 每 5 分鐘檢查一次新訊息
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests

      - name: 處理新訊息並更新 offset
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DIARY_DB_ID: ${{ secrets.DIARY_DB_ID }}
          LAST_OFFSET: ${{ vars.LAST_OFFSET || '0' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: python scripts/process_messages.py
