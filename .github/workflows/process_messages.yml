name: 處理 Bot 訊息

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests

      - name: 處理新訊息
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DIARY_DB_ID: ${{ secrets.DIARY_DB_ID }}
        run: python scripts/process_messages.py

      - name: 儲存 offset
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/last_offset.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update offset"
          git push || true
